<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MNEMOSYNE</title>
    <link rel="stylesheet" href="styles.css">
    <!-- Google Charts -->
    <script type="text/javascript" src="https://www.gstatic.com/charts/loader.js"></script>
</head>

<body>
        <!-- Écran de chargement -->
    <div id="page-loader" class="page-loader">
    <div class="loader-content">
        <div class="loader-logo">
            <svg width="80" height="80" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path
                    d="M12 6.042A8.967 8.967 0 006 3.75c-1.052 0-2.062.18-3 .512v14.25A8.987 8.987 0 016 18c2.305 0 4.408.867 6 2.292m0-14.25a8.966 8.966 0 016-2.292c1.052 0 2.062.18 3 .512v14.25A8.987 8.987 0 0018 18a8.967 8.967 0 00-6 2.292m0-14.25v14.25"
                    stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" />
            </svg>
        </div>
        <div class="loader-spinner">
            <div class="spinner-ring"></div>
            <div class="spinner-ring"></div>
            <div class="spinner-ring"></div>
        </div>
        <p class="loader-text">Chargement en cours...</p>
        <div class="loader-progress-bar">
            <div class="loader-progress-fill"></div>
        </div>
    </div>
</div>
    <header class="header">
        <div class="container">
            <div class="header-content">
                <div class="logo-section">
                    <img src="assets/logo.png" alt="Logo Mnémosyne" class="logo-image"
                        style="height: 50px; width: auto;">
                    <div class="logo-text">
                        <h1 class="logo-title">MNEMOSYNE</h1>
                        <p class="logo-subtitle">Université Sorbonne Paris Nord</p>
                    </div>
                </div>

                <!-- Hamburger Menu Button -->
                <button class="menu-toggle" aria-label="Menu" onclick="toggleMenu()">
                    <span class="bar"></span>
                    <span class="bar"></span>
                    <span class="bar"></span>
                </button>

                <nav class="nav-buttons" id="nav-menu">
                    <button class="btn-theme-toggle" id="theme-toggle" aria-label="Mode sombre">🌙</button>
                    <a href="login.html" class="btn-nav btn-primary">Connexion</a>
                </nav>
            </div>
        </div>
    </header>

    <main class="main-section">
        <div class="container">
            <div class="hero-content">
                <div class="hero-icon">
                    <svg width="40" height="40" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path
                            d="M12 6.042A8.967 8.967 0 006 3.75c-1.052 0-2.062.18-3 .512v14.25A8.987 8.987 0 016 18c2.305 0 4.408.867 6 2.292m0-14.25a8.966 8.966 0 016-2.292c1.052 0 2.062.18 3 .512v14.25A8.987 8.987 0 0018 18a8.967 8.967 0 00-6 2.292m0-14.25v14.25"
                            stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" />
                    </svg>
                </div>
                <h2 class="hero-title">Suivi des Cohortes</h2>
                <p class="hero-subtitle">IUT de Villetaneuse</p>
                <p class="hero-quote">"Garder la mémoire, éclairer les parcours"</p>
            </div>

            <div class="form-container">
                <h3 class="form-title">Accès aux parcours des étudiants</h3>
                <form class="search-form" id="filter-form">
                    <div class="form-row">
                        <div class="form-group">
                            <select id="formation" class="form-select">
                                <option value="">Choisir une formation...</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <select id="annee" class="form-select">
                                <option value="">Choisir une année...</option>
                            </select>
                        </div>
                    </div>
                    <button type="submit" class="btn-submit">
                        Voir les parcours
                        <span class="arrow">→</span>
                    </button>
                </form>
            </div>

            <!-- Conteneur du graphique Sankey -->
            <div id="sankey_chart"
                style="width: 100%; min-height: 400px; margin-top: 30px; background: #fff; padding: 20px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.05);">
                <!-- Le graphique s'affichera ici -->
            </div>
    </main>

    <footer class="footer">
        <div class="container">
            <p class="footer-quote">"Garder la mémoire, éclairer les parcours"</p>
            <p class="footer-copyright">2025 Mnémosyne - Université Sorbonne Paris Nord</p>
        </div>
    </footer>
    <script src="script.js"></script>
    <script src="loader.js"></script>
</body>

</html>
